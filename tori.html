<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1714">
<title>Tori — Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --gold: #C9A96E; --gold-dark: #9E7A45;
    --bg: #F7F5F1; --surface: #FFFFFF; --surface2: #F0EDE8;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
    --text: #1A1714; --text-muted: #6B6560; --text-faint: #A09890;
    --ig: #E8D5F5; --ig-text: #5B2D8E; --tk: #D5EBF5; --tk-text: #0A4F6E;
    --yt: #FDDDD5; --yt-text: #8B2500; --fb: #D5E8FF; --fb-text: #1A3A6E;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

  .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--text); padding: 24px; }
  .auth-card { text-align: center; max-width: 340px; width: 100%; }
  .auth-logo { font-family: 'Playfair Display', serif; font-size: 32px; color: #fff; margin-bottom: 6px; }
  .auth-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 40px; letter-spacing: 0.06em; text-transform: uppercase; }
  .auth-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: var(--gold); color: var(--text); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; justify-content: center; }
  .auth-btn img { width: 20px; height: 20px; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 16px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--text); padding: calc(16px + var(--safe-top)) 20px 16px; position: sticky; top: 0; z-index: 40; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-name { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; }
  .header-date { font-size: 12px; color: rgba(255,255,255,0.4); }
  .sign-out-btn { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 20px; padding: 4px; }
  .tab-bar { display: flex; gap: 4px; }
  .tab-btn { flex: 1; padding: 8px 6px; background: rgba(255,255,255,0.08); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.4); cursor: pointer; text-align: center; }
  .tab-btn.active { background: var(--gold); color: var(--text); }
  .content-area { flex: 1; padding: 20px 16px; padding-bottom: calc(20px + var(--safe-bottom)); }
  .tab-section { display: none; }
  .tab-section.active { display: block; }

  .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 20px; }
  .section-sub { font-size: 12px; color: var(--text-muted); }

  /* SHOT LIST */
  .shoot-section { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; }
  .shoot-section-hdr { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; gap: 10px; }
  .shoot-name { font-family: 'Playfair Display', serif; font-size: 16px; flex: 1; }
  .shoot-count { font-size: 11px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; }
  .shot-row { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .shot-row:last-child { border-bottom: none; }
  .shot-row-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .shot-number { background: var(--text); color: var(--gold); font-family: 'Playfair Display', serif; font-size: 13px; padding: 4px 9px; border-radius: 6px; flex-shrink: 0; }
  .shot-body { flex: 1; }
  .shot-desc { font-size: 14px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
  .shot-notes { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .shot-type-chip { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); margin-top: 6px; display: inline-block; }
  .shot-btn { width: 100%; padding: 10px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .shot-btn:active { transform: scale(0.97); }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-faint); }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 14px; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* UPCOMING */
  .upcoming-group { margin-bottom: 24px; }
  .upcoming-group-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .upcoming-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .upc-item { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 8px; }
  .upc-item-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .upc-date-badge { background: var(--text); color: var(--gold); border-radius: 8px; padding: 6px 10px; text-align: center; flex-shrink: 0; min-width: 48px; }
  .upc-date-badge.shoot-badge { background: #D5F5E3; color: #0A5E2A; }
  .upc-date-day { font-family: 'Playfair Display', serif; font-size: 20px; line-height: 1; }
  .upc-date-mon { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }
  .upc-body { flex: 1; min-width: 0; }
  .upc-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .upc-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .chip.ig { background: var(--ig); color: var(--ig-text); }
  .chip.tk { background: var(--tk); color: var(--tk-text); }
  .chip.yt { background: var(--yt); color: var(--yt-text); }
  .chip.fb { background: var(--fb); color: var(--fb-text); }
  .chip.type { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .chip.kind { background: var(--text); color: var(--gold); }
  .upc-action-btn { width: 100%; padding: 9px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .upc-action-btn:active { transform: scale(0.97); }

  /* IDEAS */
  .idea-form { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
  .idea-form-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .idea-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin-bottom: 10px; }
  .idea-input:focus { outline: none; border-color: var(--gold); }
  .idea-input.textarea { min-height: 80px; resize: none; }
  .idea-plat-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .plat-toggle { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
  .plat-toggle.sel-ig { background: var(--ig); color: var(--ig-text); border-color: var(--ig); }
  .plat-toggle.sel-tk { background: var(--tk); color: var(--tk-text); border-color: var(--tk); }
  .plat-toggle.sel-yt { background: var(--yt); color: var(--yt-text); border-color: var(--yt); }
  .plat-toggle.sel-fb { background: var(--fb); color: var(--fb-text); border-color: var(--fb); }
  .prio-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .prio-toggle { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); font-size: 13px; cursor: pointer; color: var(--text-muted); font-family: 'DM Sans', sans-serif; text-align: center; }
  .prio-toggle.sel-high { background: #FDDDD5; color: #8B2500; border-color: #FDDDD5; font-weight: 500; }
  .prio-toggle.sel-med { background: #FFF3D5; color: #7A5000; border-color: #FFF3D5; font-weight: 500; }
  .prio-toggle.sel-low { background: #D5F5E3; color: #0A5E2A; border-color: #D5F5E3; font-weight: 500; }
  .save-idea-btn { width: 100%; padding: 14px; background: var(--gold); color: var(--text); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
  .save-idea-btn:active { background: var(--gold-dark); color: #fff; }
  .saved-ideas { display: flex; flex-direction: column; gap: 8px; }
  .saved-idea-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 14px; cursor: pointer; }
  .saved-idea-card:active { transform: scale(0.99); }
  .saved-idea-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .saved-idea-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.4; }

  /* SHEET (idea edit) */
  .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
  .sheet-overlay.open { display: block; }
  .sheet { position: fixed; left: 0; right: 0; bottom: -100%; background: var(--surface); z-index: 201; border-radius: 16px 16px 0 0; transition: bottom 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 90vh; overflow-y: auto; padding-bottom: calc(20px + var(--safe-bottom)); }
  .sheet.open { bottom: 0; }
  .sheet-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 10px auto; }
  .sheet-hdr { padding: 10px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
  .sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; }
  .sheet-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 22px; }
  .sheet-body { padding: 0 20px; }
  .sheet-actions { padding: 16px 20px; display: flex; gap: 8px; }

  /* CONFIRM */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.open { display: flex; }
  .confirm-card { background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; }
  .confirm-title { font-family: 'Playfair Display', serif; font-size: 19px; margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 8px; }
  .confirm-btn { flex: 1; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  .confirm-btn-cancel { background: var(--surface2); color: var(--text-muted); }
  .confirm-btn-yes { background: var(--gold); color: var(--text); }
  .confirm-btn-yes.danger { background: #E24B4A; color: #fff; }

  /* BUTTONS */
  .btn-primary { padding: 12px 20px; background: var(--gold); color: var(--text); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; flex: 1; }
  .btn-danger { padding: 12px 14px; background: none; color: #E24B4A; border: 1px solid rgba(226,75,74,0.2); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }

  .toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Tori Darke</div>
    <div class="auth-sub">Content Studio</div>
    <button class="auth-btn" onclick="signIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Sign in with Google
    </button>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Loading...</div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-name">Hey Tori 👋</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <button class="sign-out-btn" onclick="signOut()"><i class="ti ti-logout"></i></button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('upcoming',this)">Upcoming</button>
      <button class="tab-btn" onclick="switchTab('ideas',this)">Ideas</button>
      <button class="tab-btn" onclick="switchTab('shotlist',this)">Shoot list</button>
    </div>
  </div>

  <div class="content-area">

    <div id="tab-shotlist" class="tab-section">
      <div class="section-hdr">
        <div class="section-title">Shoot list</div>
        <div class="section-sub" id="shotlist-count"></div>
      </div>
      <div id="shotlist-container"></div>
    </div>

    <div id="tab-upcoming" class="tab-section active">
      <div class="section-hdr">
        <div class="section-title">Coming up</div>
        <div class="section-sub">Next 14 days</div>
      </div>
      <div id="upcoming-list"></div>
    </div>

    <div id="tab-ideas" class="tab-section">
      <div class="idea-form">
        <div class="idea-form-title">Capture an idea</div>
        <input class="idea-input" id="idea-title" type="text" placeholder="What's the idea?" />
        <textarea class="idea-input textarea" id="idea-desc" placeholder="Any details, hooks, references..."></textarea>
        <div class="idea-plat-row" id="idea-plat-row">
          <button type="button" class="plat-toggle" data-plat="Instagram" onclick="togglePlat(this)">Instagram</button>
          <button type="button" class="plat-toggle" data-plat="TikTok" onclick="togglePlat(this)">TikTok</button>
          <button type="button" class="plat-toggle" data-plat="YouTube" onclick="togglePlat(this)">YouTube</button>
          <button type="button" class="plat-toggle" data-plat="Facebook" onclick="togglePlat(this)">Facebook</button>
        </div>
        <div class="prio-row" id="prio-row">
          <button type="button" class="prio-toggle" data-prio="high" onclick="selectPrio(this,'prio-row')">High</button>
          <button type="button" class="prio-toggle sel-med" data-prio="med" onclick="selectPrio(this,'prio-row')">Medium</button>
          <button type="button" class="prio-toggle" data-prio="low" onclick="selectPrio(this,'prio-row')">Low</button>
        </div>
        <button class="save-idea-btn" onclick="saveIdea()">Save idea</button>
      </div>
      <div class="saved-ideas" id="saved-ideas"></div>
    </div>

  </div>
</div>

<!-- IDEA EDIT SHEET (bottom sheet) -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="idea-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title">Edit idea</div>
    <button class="sheet-close" onclick="closeSheet()"><i class="ti ti-x"></i></button>
  </div>
  <div class="sheet-body">
    <input class="idea-input" id="edit-title" type="text" placeholder="Title" />
    <textarea class="idea-input textarea" id="edit-desc" placeholder="Description"></textarea>
    <div class="idea-plat-row" id="edit-plat-row">
      <button type="button" class="plat-toggle" data-plat="Instagram" onclick="togglePlat(this)">Instagram</button>
      <button type="button" class="plat-toggle" data-plat="TikTok" onclick="togglePlat(this)">TikTok</button>
      <button type="button" class="plat-toggle" data-plat="YouTube" onclick="togglePlat(this)">YouTube</button>
      <button type="button" class="plat-toggle" data-plat="Facebook" onclick="togglePlat(this)">Facebook</button>
    </div>
    <div class="prio-row" id="edit-prio-row">
      <button type="button" class="prio-toggle" data-prio="high" onclick="selectPrio(this,'edit-prio-row')">High</button>
      <button type="button" class="prio-toggle" data-prio="med" onclick="selectPrio(this,'edit-prio-row')">Medium</button>
      <button type="button" class="prio-toggle" data-prio="low" onclick="selectPrio(this,'edit-prio-row')">Low</button>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn-danger" onclick="deleteEditedIdea()"><i class="ti ti-trash"></i></button>
    <button class="btn-primary" onclick="saveEditedIdea()">Save</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-card">
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn confirm-btn-yes" id="confirm-yes-btn">Yes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CONFIG = {
  CLIENT_ID: '520857299754-k334d5eq7fo7m9276dsbbp6ikj4qem0n.apps.googleusercontent.com',
  SHEET_ID:  '1yfvDg-qWKAJX9BhjUoOQgld1x-xflUFADwE116Ciosc',
  CONTENT_RANGE: 'Content!A:L',
  IDEAS_RANGE:   'Ideas!A:E',
  SHOTLIST_RANGE: 'ShotList!A:G',
  SCOPES: 'https://www.googleapis.com/auth/spreadsheets',
  STORAGE_KEY: 'td_tori_token',
};
const platClass = { Instagram:'ig', TikTok:'tk', YouTube:'yt', Facebook:'fb' };
const PLATFORMS = ['Instagram','TikTok','YouTube','Facebook'];

let accessToken = null, tokenExpiry = 0;
let items = [], ideas = [], shots = [];
let tokenClient = null;
let confirmCallback = null;
let editingIdeaId = null;

// ── AUTH ──
function saveToken(token, expiresIn) {
  const expiry = Date.now() + (expiresIn * 1000) - 60000;
  localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({ token, expiry }));
  accessToken = token; tokenExpiry = expiry;
}
function loadStoredToken() {
  try { const s = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY));
    if (s && s.expiry > Date.now()) { accessToken = s.token; tokenExpiry = s.expiry; return true; }
  } catch(e) {}
  return false;
}
function clearStoredToken() { localStorage.removeItem(CONFIG.STORAGE_KEY); accessToken = null; tokenExpiry = 0; }

function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID, scope: CONFIG.SCOPES,
    callback: async (resp) => {
      if (resp.error) { if (window._tokenResolve) { window._tokenResolve(false); window._tokenResolve = null; } return; }
      saveToken(resp.access_token, resp.expires_in || 3600);
      if (window._tokenResolve) { window._tokenResolve(true); window._tokenResolve = null; return; }
      showApp(); await loadAllData();
    },
  });
  if (loadStoredToken()) { showApp(); loadAllData(); }
}
async function ensureToken() {
  if (accessToken && tokenExpiry > Date.now()) return true;
  return new Promise((resolve) => { window._tokenResolve = resolve; tokenClient.requestAccessToken({ prompt: '' }); });
}
function signIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }
function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  clearStoredToken(); items=[]; ideas=[]; shots=[];
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });
}
window.addEventListener('load', () => {
  const check = setInterval(() => { if (window.google && google.accounts) { clearInterval(check); initAuth(); } }, 100);
});

// ── SHEETS API ──
async function sheetsGet(range) {
  await ensureToken();
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}`, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (!r.ok) throw new Error('GET failed');
  return r.json();
}
async function sheetsAppend(range, values) {
  await ensureToken();
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
    method:'POST', headers: { Authorization:'Bearer '+accessToken,'Content-Type':'application/json' }, body: JSON.stringify({ values })
  });
  if (!r.ok) throw new Error('APPEND failed');
  return r.json();
}
async function sheetsBatchUpdate(data) {
  await ensureToken();
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values:batchUpdate`, {
    method:'POST', headers: { Authorization:'Bearer '+accessToken,'Content-Type':'application/json' }, body: JSON.stringify({ valueInputOption:'RAW', data })
  });
  if (!r.ok) throw new Error('BATCH failed');
  return r.json();
}
async function sheetsDeleteRow(sheetName, rowIndex) {
  await ensureToken();
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?fields=sheets.properties`, { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json());
  const sheet = meta.sheets.find(s => s.properties.title === sheetName);
  if (!sheet) throw new Error('Tab not found');
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}:batchUpdate`, {
    method:'POST', headers: { Authorization:'Bearer '+accessToken,'Content-Type':'application/json' },
    body: JSON.stringify({ requests: [{ deleteDimension: { range: { sheetId: sheet.properties.sheetId, dimension:'ROWS', startIndex:rowIndex, endIndex:rowIndex+1 } } }] })
  });
}

// ── DATA ──
function showLoading(msg) { document.getElementById('loading-text').textContent = msg; document.getElementById('loading-overlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

async function loadAllData() {
  showLoading('Loading...');
  try {
    await Promise.all([loadItems(), loadIdeas(), loadShots()]);
    renderShotList(); renderUpcoming(); renderSavedIdeas();
  } catch(e) { showToast('Error loading'); console.error(e); }
  hideLoading();
}

async function loadItems() {
  const data = await sheetsGet(CONFIG.CONTENT_RANGE);
  items = (data.values||[]).slice(1).filter(r=>r[0]).map((r,i)=>({
    id:r[0], _rowIndex:i+2,
    title:r[1]||'', platforms:r[2]?r[2].split(',').map(s=>s.trim()).filter(Boolean):[],
    type:r[3]||'Reel / Short', stage:r[4]||'Idea', priority:r[5]||'med',
    brainstormDate:r[6]||'', shootDate:r[7]||'', editDate:r[8]||'', postDate:r[9]||'',
    notes:r[10]||'', archived:(r[11]||'').toLowerCase()==='true'
  }));
}

async function loadIdeas() {
  const data = await sheetsGet(CONFIG.IDEAS_RANGE);
  ideas = (data.values||[]).slice(1).filter(r=>r[0]).map((r,i)=>({
    id:r[0], _rowIndex:i+2,
    title:r[1]||'', desc:r[2]||'',
    platforms:r[3]?r[3].split(',').map(s=>s.trim()).filter(Boolean):[],
    priority:r[4]||'med'
  }));
}

async function loadShots() {
  try {
    const data = await sheetsGet(CONFIG.SHOTLIST_RANGE);
    shots = (data.values||[]).slice(1).filter(r=>r[0]).map((r,i)=>({
      id:r[0], _rowIndex:i+2,
      shootName:r[1]||'', shotNumber:r[2]||'', description:r[3]||'', type:r[4]||'', notes:r[5]||'', status:r[6]||'pending'
    }));
  } catch(e) { shots = []; }
}

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'shotlist') { loadShots().then(renderShotList); }
  if (name === 'upcoming') { loadItems().then(renderUpcoming); }
}

// ── SHOT LIST ──
function renderShotList() {
  const container = document.getElementById('shotlist-container');
  const active = shots.filter(s => s.status !== 'shot');
  document.getElementById('shotlist-count').textContent = active.length ? `${active.length} shot${active.length!==1?'s':''}` : '';

  if (!active.length) {
    container.innerHTML = `<div class="empty-state"><i class="ti ti-camera"></i><p>No active shots right now.<br>Jeremy will push a new shoot list here after planning.</p></div>`;
    return;
  }
  const grouped = {};
  active.forEach(s => { if (!grouped[s.shootName]) grouped[s.shootName] = []; grouped[s.shootName].push(s); });

  container.innerHTML = '';
  Object.keys(grouped).forEach(shootName => {
    const groupShots = grouped[shootName].sort((a,b) => (a.shotNumber||'').localeCompare(b.shotNumber||'', undefined, { numeric: true }));
    const section = document.createElement('div');
    section.className = 'shoot-section';
    let html = `<div class="shoot-section-hdr">
      <div class="shoot-name">${shootName}</div>
      <div class="shoot-count">${groupShots.length} shot${groupShots.length!==1?'s':''}</div>
    </div>`;
    groupShots.forEach(shot => {
      html += `<div class="shot-row" id="shot-${shot.id}">
        <div class="shot-row-top">
          <div class="shot-number">${shot.shotNumber || '–'}</div>
          <div class="shot-body">
            <div class="shot-desc">${shot.description}</div>
            ${shot.notes ? `<div class="shot-notes">${shot.notes}</div>` : ''}
            ${shot.type ? `<span class="shot-type-chip">${shot.type}</span>` : ''}
          </div>
        </div>
        <button class="shot-btn" onclick="markShotDone('${shot.id}')">
          <i class="ti ti-camera"></i> Mark as shot
        </button>
      </div>`;
    });
    section.innerHTML = html;
    container.appendChild(section);
  });
}

function markShotDone(id) {
  const shot = shots.find(s => s.id === id); if (!shot) return;
  showConfirm(
    'Mark this shot as complete?',
    `"${shot.description}" will be removed from your list. This can't be undone.`,
    async () => {
      shots = shots.filter(s => s.id !== id);
      renderShotList();
      showToast('Shot complete 🎬');
      try { await sheetsDeleteRow('ShotList', shot._rowIndex - 1); await loadShots(); }
      catch(e) { showToast('Save failed'); console.error(e); }
    }
  );
}

// ── UPCOMING ──
function renderUpcoming() {
  const now = new Date(); now.setHours(0,0,0,0);
  const future = new Date(now); future.setDate(now.getDate() + 14);

  const upcomingShoots = items
    .filter(item => {
      if (item.archived || !item.shootDate) return false;
      if (['Shot','In edit','Scheduled'].includes(item.stage)) return false;
      const d = new Date(item.shootDate + 'T00:00:00');
      return d >= now && d <= future;
    })
    .map(item => ({ kind:'shoot', date:item.shootDate, item }));

  const upcomingPosts = items
    .filter(item => {
      if (item.archived || !item.postDate) return false;
      if (item.stage !== 'Scheduled') return false;
      const d = new Date(item.postDate + 'T00:00:00');
      return d >= now && d <= future;
    })
    .map(item => ({ kind:'post', date:item.postDate, item }));

  const all = [...upcomingShoots, ...upcomingPosts].sort((a,b) => a.date.localeCompare(b.date));

  const container = document.getElementById('upcoming-list');

  if (!all.length) {
    container.innerHTML = `<div class="empty-state"><i class="ti ti-calendar"></i><p>Nothing coming up in the next 14 days.</p></div>`;
    return;
  }

  // Group by kind
  const shootsGroup = all.filter(x => x.kind === 'shoot');
  const postsGroup = all.filter(x => x.kind === 'post');

  let html = '';

  if (shootsGroup.length) {
    html += `<div class="upcoming-group"><div class="upcoming-group-label">Upcoming shoots</div>`;
    shootsGroup.forEach(x => {
      const d = new Date(x.date + 'T00:00:00');
      const day = d.toLocaleDateString('en-AU', { day:'numeric' });
      const mon = d.toLocaleDateString('en-AU', { month:'short' });
      const platChips = x.item.platforms.map(p => `<span class="chip ${platClass[p]||''}">${p}</span>`).join('');
      html += `<div class="upc-item">
        <div class="upc-item-top">
          <div class="upc-date-badge shoot-badge">
            <div class="upc-date-day">${day}</div>
            <div class="upc-date-mon">${mon}</div>
          </div>
          <div class="upc-body">
            <div class="upc-title">${x.item.title}</div>
            <div class="upc-chips">${platChips}<span class="chip type">${x.item.type}</span></div>
          </div>
        </div>
        <button class="upc-action-btn" onclick="markAsShot('${x.item.id}')"><i class="ti ti-camera"></i> Mark as shot</button>
      </div>`;
    });
    html += `</div>`;
  }

  if (postsGroup.length) {
    html += `<div class="upcoming-group"><div class="upcoming-group-label">Posting soon</div>`;
    postsGroup.forEach(x => {
      const d = new Date(x.date + 'T00:00:00');
      const day = d.toLocaleDateString('en-AU', { day:'numeric' });
      const mon = d.toLocaleDateString('en-AU', { month:'short' });
      const platChips = x.item.platforms.map(p => `<span class="chip ${platClass[p]||''}">${p}</span>`).join('');
      html += `<div class="upc-item">
        <div class="upc-item-top">
          <div class="upc-date-badge">
            <div class="upc-date-day">${day}</div>
            <div class="upc-date-mon">${mon}</div>
          </div>
          <div class="upc-body">
            <div class="upc-title">${x.item.title}</div>
            <div class="upc-chips">${platChips}<span class="chip type">${x.item.type}</span></div>
          </div>
        </div>
        <button class="upc-action-btn" onclick="markAsPosted('${x.item.id}')"><i class="ti ti-check"></i> Mark as posted</button>
      </div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

function markAsShot(id) {
  const item = items.find(i => i.id === id); if (!item) return;
  showConfirm(
    'Mark as shot?',
    `"${item.title}" will move to the edit stage.`,
    async () => {
      item.stage = 'Shot';
      showToast('Marked as shot 🎬');
      renderUpcoming();
      try {
        await sheetsBatchUpdate([{ range:`Content!E${item._rowIndex}`, values:[['Shot']] }]);
      } catch(e) { showToast('Save failed'); console.error(e); }
    }
  );
}

function markAsPosted(id) {
  const item = items.find(i => i.id === id); if (!item) return;
  showConfirm(
    'Mark as posted?',
    `"${item.title}" will be archived. Only the post date will remain on the calendar.`,
    async () => {
      item.archived = true;
      showToast('Posted 🎉');
      renderUpcoming();
      try {
        await sheetsBatchUpdate([{ range:`Content!L${item._rowIndex}`, values:[['true']] }]);
      } catch(e) { showToast('Save failed'); console.error(e); }
    }
  );
}

// ── IDEAS ──
function renderSavedIdeas() {
  const container = document.getElementById('saved-ideas');
  if (!ideas.length) { container.innerHTML = '<div style="text-align:center;color:var(--text-faint);font-size:13px;padding:20px;">Your saved ideas will appear here.</div>'; return; }
  container.innerHTML = ideas.map(idea => {
    const chips = idea.platforms.map(p => `<span class="chip ${platClass[p]||''}">${p}</span>`).join('');
    return `<div class="saved-idea-card" onclick="openIdeaSheet('${idea.id}')">
      <div class="saved-idea-title">${idea.title}</div>
      ${idea.desc ? `<div class="saved-idea-desc">${idea.desc}</div>` : ''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;">${chips}</div>
    </div>`;
  }).join('');
}

async function saveIdea() {
  const title = document.getElementById('idea-title').value.trim();
  if (!title) { showToast('Add a title first'); return; }
  const selPlats = [...document.querySelectorAll('#idea-plat-row .plat-toggle')].filter(b=>b.className.includes('sel-')).map(b=>b.dataset.plat);
  const selPrio = document.querySelector('#prio-row .prio-toggle[class*="sel-"]');
  const newIdea = { id:generateId(), title, desc:document.getElementById('idea-desc').value.trim(), platforms:selPlats, priority:selPrio?selPrio.dataset.prio:'med' };

  ideas.push(newIdea); renderSavedIdeas(); showToast('Idea saved 💡');

  document.getElementById('idea-title').value = '';
  document.getElementById('idea-desc').value = '';
  document.querySelectorAll('#idea-plat-row .plat-toggle').forEach(b=>b.className='plat-toggle');
  document.querySelectorAll('#prio-row .prio-toggle').forEach(b=>{b.className='prio-toggle'+(b.dataset.prio==='med'?' sel-med':'');});

  try {
    await sheetsAppend(CONFIG.IDEAS_RANGE, [[newIdea.id, newIdea.title, newIdea.desc, newIdea.platforms.join(', '), newIdea.priority]]);
    await loadIdeas();
  } catch(e) { showToast('Save failed'); console.error(e); }
}

function openIdeaSheet(id) {
  const idea = ideas.find(i => i.id === id); if (!idea) return;
  editingIdeaId = id;
  document.getElementById('edit-title').value = idea.title;
  document.getElementById('edit-desc').value = idea.desc;
  document.querySelectorAll('#edit-plat-row .plat-toggle').forEach(b => {
    b.className = 'plat-toggle' + (idea.platforms.includes(b.dataset.plat) ? ' sel-' + platClass[b.dataset.plat] : '');
  });
  document.querySelectorAll('#edit-prio-row .prio-toggle').forEach(b => {
    b.className = 'prio-toggle' + (b.dataset.prio === idea.priority ? ' sel-' + b.dataset.prio : '');
  });
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('idea-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('idea-sheet').classList.remove('open');
  editingIdeaId = null;
}

async function saveEditedIdea() {
  const idea = ideas.find(i => i.id === editingIdeaId); if (!idea) return;
  idea.title = document.getElementById('edit-title').value.trim() || idea.title;
  idea.desc = document.getElementById('edit-desc').value;
  idea.platforms = [...document.querySelectorAll('#edit-plat-row .plat-toggle')].filter(b=>b.className.includes('sel-')).map(b=>b.dataset.plat);
  const selPrio = document.querySelector('#edit-prio-row .prio-toggle[class*="sel-"]');
  if (selPrio) idea.priority = selPrio.dataset.prio;

  closeSheet();
  renderSavedIdeas();
  showToast('Saving...');
  try {
    await sheetsBatchUpdate([{ range:`Ideas!A${idea._rowIndex}:E${idea._rowIndex}`,
      values:[[idea.id, idea.title, idea.desc, idea.platforms.join(', '), idea.priority]] }]);
    showToast('Idea updated');
  } catch(e) { showToast('Save failed'); console.error(e); }
}

function deleteEditedIdea() {
  const idea = ideas.find(i => i.id === editingIdeaId); if (!idea) return;
  showConfirm(
    'Delete this idea?',
    `"${idea.title}" will be permanently removed.`,
    async () => {
      ideas = ideas.filter(i => i.id !== editingIdeaId);
      closeSheet(); renderSavedIdeas(); showToast('Deleted');
      try { await sheetsDeleteRow('Ideas', idea._rowIndex - 1); await loadIdeas(); }
      catch(e) { console.error(e); }
    },
    true
  );
}

// ── CONFIRM ──
function showConfirm(title, msg, callback, isDanger) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const btn = document.getElementById('confirm-yes-btn');
  btn.className = 'confirm-btn confirm-btn-yes' + (isDanger ? ' danger' : '');
  btn.textContent = isDanger ? 'Yes, delete' : 'Yes';
  confirmCallback = callback;
  document.getElementById('confirm-overlay').classList.add('open');
  btn.onclick = () => { closeConfirm(); if (confirmCallback) confirmCallback(); };
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); confirmCallback = null; }

// ── HELPERS ──
function togglePlat(btn) {
  const cls = platClass[btn.dataset.plat];
  btn.className = btn.className.includes('sel-') ? 'plat-toggle' : 'plat-toggle sel-' + cls;
}
function selectPrio(btn, groupId) {
  document.querySelectorAll('#'+groupId+' .prio-toggle').forEach(b=>b.className='prio-toggle');
  btn.className = 'prio-toggle sel-' + btn.dataset.prio;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
